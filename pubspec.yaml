name: fluttersdk_telescope
description: "Passive inspector for Flutter apps. HTTP capture (Dio adapter) + log sink (package:logging) + exception capture + in-app Flutter overlay dashboard. Framework-agnostic (vanilla Flutter friendly); Magic ships its own MagicHttpFacadeAdapter + MagicModelWatcher + MagicCacheWatcher via TelescopePlugin.registerHttpAdapter + registerWatcher extension points."
version: 1.0.0-alpha.2
homepage: https://telescope.fluttersdk.com
repository: https://github.com/fluttersdk/telescope

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  fluttersdk_artisan:
    path: ../fluttersdk_artisan
  logging: ^1.2.0
  meta: ^1.16.0

executables:
  # `dart run fluttersdk_telescope <cmd>` ; telescope-flavoured artisan wrapper.
  # Proxies the full artisan CLI surface AND surfaces the 3 telescope CLI
  # commands + 7 telescope_* MCP tools via TelescopeArtisanProvider.
  fluttersdk_telescope: fluttersdk_telescope

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Path dep (dev-only) for the Magic integration watcher tests under
  # test/src/magic/. Magic ships MagicEventWatcher / MagicGateWatcher /
  # MagicModelWatcher / MagicCacheWatcher / MagicHttpFacadeAdapter on top
  # of telescope's TelescopePlugin extension points; the tests exercise
  # those watchers via magic's EventDispatcher and TelescopeStore. Not a
  # production dep — telescope stays framework-agnostic at runtime.
  magic:
    path: ../magic

# Magic resolves fluttersdk_artisan via hosted constraint; mirror its
# path override so the path-resolved `magic` dev_dep above unifies with
# our own path dep on the same package. Required because magic ships
# `dependency_overrides:` for the same packages in its own pubspec.
dependency_overrides:
  fluttersdk_artisan:
    path: ../fluttersdk_artisan
  fluttersdk_dusk:
    path: ../fluttersdk_dusk

publish_to: none
