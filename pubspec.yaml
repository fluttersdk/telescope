name: fluttersdk_telescope
description: "Passive runtime inspector for Flutter apps. HTTP, log, exception, debugPrint, DB query, and Magic model/cache/event/gate capture, surfaced over VM Service extensions to CLI and MCP tools."
version: 0.0.1
homepage: https://telescope.fluttersdk.com
repository: https://github.com/fluttersdk/telescope
issue_tracker: https://github.com/fluttersdk/telescope/issues
documentation: https://fluttersdk.com/telescope

# pub.dev search topics (max 5, lowercase + hyphens, regex ^[a-z][a-z0-9-]{0,31}$).
# These drive tag-based discovery on https://pub.dev/packages?q=topic%3A<topic>.
topics:
  - flutter
  - inspector
  - debugging
  - mcp-server
  - observability

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  fluttersdk_artisan: ^0.0.2
  logging: ^1.2.0
  meta: ^1.16.0

executables:
  # `dart run fluttersdk_telescope <cmd>` ; telescope-flavoured artisan wrapper.
  # Proxies the full artisan CLI surface AND surfaces the 6 telescope CLI
  # commands + 9 telescope_* MCP tools via TelescopeArtisanProvider.
  fluttersdk_telescope: fluttersdk_telescope

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"
