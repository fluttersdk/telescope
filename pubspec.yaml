name: fluttersdk_telescope
description: "Passive runtime inspector for Flutter. Captures HTTP, logs, exceptions, DB queries, and Magic events via VM Service extensions. CLI tail and MCP tools for Claude Code."
version: 0.0.2
homepage: https://fluttersdk.com/telescope
repository: https://github.com/fluttersdk/telescope
issue_tracker: https://github.com/fluttersdk/telescope/issues
documentation: https://fluttersdk.com/telescope

# pub.dev search topics (max 5, lowercase + hyphens, regex ^[a-z][a-z0-9-]{0,31}$).
# Order = priority. `mcp-server` + `ai-agents` are blue-ocean (2 packages each
# as of 2026-05); `inspector` + `observability` are mid-traffic perfect-fit;
# `debugging` is the high-volume catch-all. Skip `flutter` (near-zero signal)
# and `vm-service` (zero traffic). See marketing dossier for full analysis.
topics:
  - mcp-server
  - ai-agents
  - inspector
  - observability
  - debugging

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  fluttersdk_artisan: ^0.0.4
  logging: ^1.2.0
  meta: ^1.16.0

executables:
  # `dart run fluttersdk_telescope <cmd>` ; telescope-flavoured artisan wrapper.
  # Proxies the full artisan CLI surface AND surfaces the 6 telescope CLI
  # commands + 9 telescope_* MCP tools via TelescopeArtisanProvider.
  fluttersdk_telescope: fluttersdk_telescope

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"
