# Dev-only overrides for sibling packages.
# Committed to repo, excluded from publish archive via .pubignore.
# Magic + Artisan resolve from sibling references/ paths during dev;
# Dusk is overridden because magic transitively depends on it;
# at pub publish time the hosted constraints in pubspec.yaml take effect.
dependency_overrides:
  fluttersdk_artisan:
    path: ../fluttersdk_artisan
  fluttersdk_dusk:
    path: ../fluttersdk_dusk
  magic:
    path: ../magic
